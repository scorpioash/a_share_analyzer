name: Daily A-Share Analysis

on:
  schedule:
    # 每天北京时间下午 16:00 (UTC 8:00) 自动执行
    - cron: '0 8 * * 1-5'

  # 支持手动指定股票代码一键触发
  workflow_dispatch:
    inputs:
      stocks:
        description: '临时指定要分析的A股代码（选填，逗号分隔，覆盖 Secrets 设置）'
        required: false
        default: ''

jobs:
  run-analyzer:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 环境与网络自检
        run: |
          echo "=== Python 版本 ==="
          python --version
          echo ""
          echo "=== 关键依赖检查 ==="
          pip list 2>/dev/null | grep -iE "streamlit|akshare|pandas|openai|anthropic|google-genai|httpx|requests|tabulate" || true
          echo ""
          echo "=== 国内数据源连通性测试 (GitHub runner 在海外，部分接口可能慢) ==="
          curl -s -o /dev/null -w "东财 push2: %{http_code} 耗时=%{time_total}s\n" https://push2.eastmoney.com/api/qt/stock/get --max-time 10 || echo "东财: 无法访问"
          curl -s -o /dev/null -w "新浪 hq : %{http_code} 耗时=%{time_total}s\n" "https://hq.sinajs.cn/list=sh000001" --max-time 10 || echo "新浪: 无法访问"
          curl -s -o /dev/null -w "雪球    : %{http_code} 耗时=%{time_total}s\n" https://stock.xueqiu.com --max-time 10 || echo "雪球: 无法访问"
          curl -s -o /dev/null -w "腾讯 qt : %{http_code} 耗时=%{time_total}s\n" https://qt.gtimg.cn/q=sh000001 --max-time 10 || echo "腾讯: 无法访问"

      - name: 执行盘后分析
        env:
          # LLM 配置
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'openai' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

          # 推送配置
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

          # 股票池：手动输入优先 > Secrets 配置
          STOCK_LIST: ${{ github.event.inputs.stocks || secrets.STOCK_LIST }}

          # 🔑 CI 环境专用：禁用 bypass_proxy 的 DNS 劫持
          # GitHub runner 在海外访问阿里 DoH (223.5.5.5) 不稳定，直接用系统 DNS
          AK_NET_MODE: bypass
          AK_DNS_HIJACK: "0"

          # 🔑 保证 print 实时刷到日志
          PYTHONUNBUFFERED: "1"

          # 🔑 标记是 CI 环境，代码里可据此做区分逻辑
          IN_GITHUB_ACTIONS: "1"

        run: python -u main.py